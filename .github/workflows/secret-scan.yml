name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: Heuristic secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets (heuristic grep)
        run: |
          echo "=== Escaneando patrones de secretos ==="
          FOUND=0

          # Buscar en archivos rastreados (excluir .git y node_modules)
          if grep -r --include='*.py' --include='*.sh' --include='*.yml' \
            --include='*.yaml' --include='*.json' --include='*.env' \
            --include='*.md' \
            -E 'sk-[A-Za-z0-9_-]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN (RSA |EC )?PRIVATE KEY|ghp_[A-Za-z0-9]{36,}|ghs_[A-Za-z0-9]{36,}' \
            --exclude-dir='.git' --exclude-dir='node_modules' \
            -l . 2>/dev/null; then
            echo "ERROR: Se detectaron patrones de posibles secretos."
            FOUND=1
          fi

          if [ $FOUND -eq 1 ]; then
            echo "Revoca las claves detectadas y limpia el historial con BFG o git-filter-repo."
            exit 1
          else
            echo "OK: No se detectaron patrones de secretos."
          fi

      - name: Check for .env files committed
        run: |
          if git ls-files | grep -E '\.env$|\.env\.' 2>/dev/null; then
            echo "ERROR: Archivos .env rastreados por git. Añádelos a .gitignore."
            exit 1
          else
            echo "OK: No hay archivos .env rastreados."
          fi
