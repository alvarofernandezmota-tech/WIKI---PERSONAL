name: Meta Deep Audit (semanal)

on:
  schedule:
    - cron: '0 8 * * 1'  # Lunes a las 08:00 UTC
  workflow_dispatch:

jobs:
  meta-deep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar entorno
        run: |
          echo "YGGDRASIL_ROOT=$(pwd)" >> $GITHUB_ENV
          chmod +x scripts/agentes/*.sh 2>/dev/null || true

      - name: Ejecutar agente meta deep
        run: bash scripts/agentes/agente-meta-deep.sh

      - name: Subir reporte
        uses: actions/upload-artifact@v4
        with:
          name: meta-deep-report-${{ github.run_id }}
          path: reports/meta-deep/
          retention-days: 90

      - name: Crear issue con propuestas (si hay críticos)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = 'reports/meta-deep';
            if (!fs.existsSync(dir)) return;
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.md')).sort().reverse();
            if (!files.length) return;
            const content = fs.readFileSync(path.join(dir, files[0]), 'utf8');
            if (!content.includes('⚠️') && !content.includes('CRÍTICO')) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[meta-deep] Propuestas críticas — ${new Date().toISOString().slice(0,10)}`,
              body: `## Reporte meta-deep\n\nSe detectaron elementos críticos. Ver artifacts del run #${context.runId}.\n\n<details><summary>Extracto</summary>\n\n\`\`\`\n${content.slice(0, 2000)}\n\`\`\`\n</details>`,
              labels: ['meta-deep', 'automated']
            });
