name: Meta-Deep Audit

on:
  schedule:
    - cron: '0 22 * * 0'  # Domingos a las 22:00 UTC
  workflow_dispatch:
    inputs:
      scope:
        description: 'Scope de auditoría'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - scripts
          - docs
          - workflows

jobs:
  meta-deep:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ejecutar Agente Meta-Deep
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/agentes/agente-meta-deep.sh
          bash scripts/agentes/agente-meta-deep.sh "${{ github.event.inputs.scope || 'full' }}"

      - name: Crear issue si hay problemas
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const glob = require('glob');
            const files = fs.readdirSync('inbox').filter(f => f.startsWith('meta-deep-'));
            if (files.length === 0) return;
            const latest = files.sort().pop();
            const content = fs.readFileSync(`inbox/${latest}`, 'utf8');
            if (content.includes('⚠️')) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔍 Meta-Deep Audit ${new Date().toISOString().split('T')[0]}`,
                body: `## Auditoría automática detectó problemas\n\n${content.slice(0, 3000)}`,
                labels: ['audit', 'auto-generated']
              });
            }

      - name: Commit resultados
        run: |
          git config user.name "thdora-guardian[bot]"
          git config user.email "bot@yggdrasil-dew"
          git add inbox/ diary/ || true
          git diff --staged --quiet || git commit -m "chore: meta-deep audit $(date +%Y-%m-%d)"
          git push || true
