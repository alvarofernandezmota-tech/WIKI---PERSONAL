# FUNCIÓN:   Auditar cabeceras de scripts semanalmente
# TRIGGER:   Cron semanal miércoles 07:00 UTC + manual
# AGENTE:    tool-inventory-auditor
# ETIQUETAS: estructura, automatizacion
name: tool-inventory-auditor

on:
  schedule:
    - cron: '0 7 * * 3'
  workflow_dispatch:

jobs:
  tool-inventory:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Run tool-inventory-auditor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YGGDRASIL_ROOT: ${{ github.workspace }}
        run: |
          chmod +x scripts/tool-inventory-auditor.sh
          bash scripts/tool-inventory-auditor.sh

      - name: Commit reporte
        run: |
          git config user.name  "tool-inventory[bot]"
          git config user.email "bot@yggdrasil-dew"
          git add diarios/ || true
          git diff --cached --quiet || git commit -m "chore: tool-inventory $(date +%Y-%m-%d) [AUTO]"
          git push || true
