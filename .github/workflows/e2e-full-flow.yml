name: E2E Full Flow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install --quiet requests 2>/dev/null || true

      - name: Crear carpetas necesarias
        run: |
          mkdir -p inbox/ocr/raw inbox/ocr/text inbox/ocr/processed \
                   inbox/context/perplexity inbox/drop inbox/_meta \
                   tools/vector_index logs reports/audit reports/verify

      - name: Run E2E local
        run: bash scripts/verify/e2e-local.sh

      - name: Run smoke tests
        run: bash scripts/verify/run-smoke-tests.sh || true

      - name: Check structure
        run: bash scripts/verify/check-structure.sh || true

      - name: Validate workflows
        run: bash scripts/verify/validate-workflows.sh || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports-${{ github.run_id }}
          path: reports/
          if-no-files-found: ignore
