# ==============================================================
# REPO RESEARCH ON PUSH
# Trigger: push a main que modifique scripts/ o docs/
# Rol: ejecutar repo-research.sh en el runner y subir el
#      informe a inbox/ (sin necesitar SSH a Madre)
# ==============================================================
name: repo-research-on-push

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'docs/**'
      - 'ROADMAP-MASTER.md'
  workflow_dispatch:

jobs:
  research:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ejecutar repo-research.sh
        run: |
          chmod +x scripts/repo-research.sh
          # En el runner no hay /srv, usa el directorio actual
          REPO_DIR="$(pwd)" bash scripts/repo-research.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit y push del informe
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add inbox/ || true
          git diff --staged --quiet || \
            git commit -m "feat(inbox): repo-research auto on push [AUTO]" && \
            git push
