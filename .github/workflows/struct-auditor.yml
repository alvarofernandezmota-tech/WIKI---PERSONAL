# FUNCIÓN:   Auditoría semanal de carpetas duplicadas
# TRIGGER:   Cron semanal lunes 07:00 UTC + manual
# AGENTE:    struct-auditor
# ETIQUETAS: duplicado, estructura
name: struct-auditor

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  struct-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Run struct-auditor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YGGDRASIL_ROOT: ${{ github.workspace }}
        run: |
          chmod +x scripts/struct-auditor.sh
          bash scripts/struct-auditor.sh

      - name: Commit log
        run: |
          git config user.name  "struct-auditor[bot]"
          git config user.email "bot@yggdrasil-dew"
          git add diarios/ || true
          git diff --cached --quiet || git commit -m "chore: struct-audit $(date +%Y-%m-%d) [AUTO]"
          git push || true
