# =============================================================
# FUNCIÓN:   Gestiona los 3 estados del inbox (NUEVO → EN-PROCESO
#            → PROCESADO). Detecta archivos bloqueados >24h y
#            los mueve a archive abriendo un issue de alerta.
# TRIGGER:   push a main / cron cada 6h / workflow_dispatch
# ETIQUETAS: inbox, urgente (si hay bloqueados)
# DEPS:      scripts/gestor-estados-inbox.sh
# =============================================================

name: 🔄 Gestor Estados Inbox

on:
  push:
    branches: [main]
    paths:
      - 'inbox/**'
  schedule:
    - cron: '0 */6 * * *'  # cada 6 horas
  workflow_dispatch:

jobs:
  gestionar-estados:
    name: Gestionar estados inbox
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar git
        run: |
          git config user.name  "thdora-gestor[bot]"
          git config user.email "thdora-gestor[bot]@users.noreply.github.com"

      - name: Instalar gh CLI
        run: |
          type -p gh >/dev/null 2>&1 || (
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              | sudo tee /etc/apt/sources.list.d/github-cli.list
            sudo apt-get update && sudo apt-get install gh -y
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ejecutar gestor de estados
        run: |
          chmod +x scripts/gestor-estados-inbox.sh
          bash scripts/gestor-estados-inbox.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cambios de estados
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Sin cambios de estado que commitear"
          else
            git commit -m "chore: [AUTO] gestor-estados-inbox actualizó estados"
            git push
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resumen
        run: |
          echo "### 🔄 Gestor Estados Inbox" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          NUEVOS=$(find inbox/ -maxdepth 1 -name '*.md' 2>/dev/null | wc -l | tr -d ' ')
          ARCHIVADOS=$(find inbox/archive/ -name '*.md' 2>/dev/null | wc -l | tr -d ' ')
          echo "| Estado | Archivos |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| En inbox | $NUEVOS |" >> $GITHUB_STEP_SUMMARY
          echo "| En archive | $ARCHIVADOS |" >> $GITHUB_STEP_SUMMARY
