# =============================================================================
# TRIPWIRE REPO — Yggdrasil
# Detecta cambios no autorizados o peligrosos en el repositorio
# Se ejecuta en cada push y PR
# =============================================================================
name: 🔒 Tripwire Repo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tripwire:
    name: Auditar cambios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Necesario para ver el diff

      - name: Detectar ficheros críticos modificados
        id: criticos
        run: |
          # Ficheros que no deberían cambiar sin revisión explícita
          CRITICOS="docs/NORMAS-ECOSISTEMA.md ECOSYSTEM-ARCHITECTURE.md docs/SPRINTS.md"
          MODIFICADOS=""
          for f in $CRITICOS; do
            if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -q "$f"; then
              MODIFICADOS="$MODIFICADOS $f"
              echo "⚠️  Fichero crítico modificado: $f"
            fi
          done
          echo "modificados=$MODIFICADOS" >> $GITHUB_OUTPUT

      - name: Detectar .env o secretos accidentales
        run: |
          # Buscar patrones de secretos en ficheros nuevos/modificados
          git diff HEAD~1 HEAD 2>/dev/null | grep '^+' | \
            grep -vE '^\+\+\+' | \
            grep -iE '(token|secret|password|api_key|authkey)\s*[=:]\s*["\x27]?[a-zA-Z0-9_\-]{16,}' && \
            echo '🚨 POSIBLE SECRETO EN DIFF' || \
            echo '✅ Sin secretos detectados en diff'

      - name: Detectar ficheros .env commiteados
        run: |
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -E '\.env$|\.env\.'; then
            echo '🚨 FICHERO .env EN EL COMMIT'
            exit 1
          else
            echo '✅ Sin .env en el commit'
          fi

      - name: Resumen de cambios
        run: |
          echo "📊 RESUMEN DEL COMMIT:"
          echo "Autor: ${{ github.actor }}"
          echo "Rama: ${{ github.ref_name }}"
          echo "Mensaje: ${{ github.event.head_commit.message }}"
          echo ""
          echo "Ficheros modificados:"
          git diff --name-only HEAD~1 HEAD 2>/dev/null | head -20 || true

      - name: Notificar cambio en fichero crítico
        if: ${{ steps.criticos.outputs.modificados != '' }}
        run: |
          if [ -n "${{ secrets.TELEGRAM_TOKEN }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d text="⚠️ *Tripwire Repo*%0AFichero crítico modificado:%0A${{ steps.criticos.outputs.modificados }}%0A%0APor: ${{ github.actor }}" \
              -d parse_mode=Markdown
          fi
