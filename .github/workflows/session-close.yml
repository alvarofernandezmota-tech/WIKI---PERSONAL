name: Session Close

on:
  push:
    branches: [main]
    paths:
      - 'inbox/sesiones/cierre-*.md'

jobs:
  move-to-diarios:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Mover cierres a diarios/
        run: |
          mkdir -p diarios
          for f in inbox/sesiones/cierre-*.md; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            dest="diarios/$name"
            mv "$f" "$dest"
            echo "Movido: $f -> $dest"
          done

      - name: Commit y push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add diarios/ inbox/sesiones/
          git diff --cached --quiet || git commit -m "docs(sesion): mover cierres a diarios/ [skip ci]"
          git push origin main
