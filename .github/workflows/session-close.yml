name: 🔐 Session Close — Cierre de sesión

on:
  workflow_dispatch:
    inputs:
      session_id:
        description: 'ID sesión a cerrar (ej: S20260703)'
        required: true
      session_summary:
        description: 'Resumen breve de lo hecho (1-3 líneas)'
        required: true

jobs:
  close-session:
    name: Cerrar y documentar sesión
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - name: 📅 Variables
        id: vars
        run: |
          DATE=$(date +%Y-%m-%d)
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "year=$YEAR" >> $GITHUB_OUTPUT
          echo "month=$MONTH" >> $GITHUB_OUTPUT
          echo "diary_path=diario/$YEAR/$MONTH/$DATE.md" >> $GITHUB_OUTPUT

      - name: 📜 Todos los commits de la sesión
        id: all_commits
        run: |
          SESSION="${{ github.event.inputs.session_id }}"
          DATE=$(date +%Y-%m-%d)
          LOG=$(git log --since="$DATE 00:00" \
            --pretty=format:"### %ad — %h%n**%s**%n%b" \
            --date=format:"%H:%M" \
            HEAD)
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "${LOG:-Sin commits esta sesión}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 📓 Actualizar diary con cierre completo
        uses: actions/github-script@v7
        with:
          script: |
            const path = '${{ steps.vars.outputs.diary_path }}';
            const date = '${{ steps.vars.outputs.date }}';
            const session = '${{ github.event.inputs.session_id }}';
            const summary = '${{ github.event.inputs.session_summary }}';
            const commits = `${{ steps.all_commits.outputs.log }}`;

            const closeBlock = `\n\n---\n\n## 🔐 Cierre de sesión ${session}\n\n**Hora cierre:** ${new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'})} CEST  \n**Resumen:** ${summary}\n\n### 📜 Log completo de commits\n\n${commits}\n\n---\n*Sesión cerrada por workflow session-close.yml*\n`;

            const encoded = Buffer.from(closeBlock).toString('base64');

            let existingSha;
            let existingContent = '';
            try {
              const existing = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: path
              });
              existingSha = existing.data.sha;
              existingContent = Buffer.from(existing.data.content, 'base64').toString();
            } catch(e) {}

            const newContent = existingContent + closeBlock;
            const newEncoded = Buffer.from(newContent).toString('base64');

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path,
              message: `docs: cierre sesión ${session}`,
              content: newEncoded,
              sha: existingSha
            });
            console.log(`Sesión ${session} cerrada en ${path}`);

      - name: ✅ Actualizar SIGUIENTE-PASO.md
        uses: actions/github-script@v7
        with:
          script: |
            const session = '${{ github.event.inputs.session_id }}';
            const nextNum = parseInt(session.slice(9)) + 1 || 'siguiente';
            const content = `# ▶️ Siguiente paso\n\n> Sesión ${session} cerrada.\n\n## 🔴 Pendiente\n\nVer \`inbox/PENDIENTES-S21.md\` para las tareas ordenadas.\n\n*Actualizado automáticamente al cerrar sesión.*\n`;
            const encoded = Buffer.from(content).toString('base64');
            try {
              const existing = await github.rest.repos.getContent({
                owner: context.repo.owner, repo: context.repo.repo,
                path: 'inbox/SIGUIENTE-PASO.md'
              });
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner, repo: context.repo.repo,
                path: 'inbox/SIGUIENTE-PASO.md',
                message: `chore: cerrar sesión ${session}`,
                content: encoded, sha: existing.data.sha
              });
            } catch(e) {}
