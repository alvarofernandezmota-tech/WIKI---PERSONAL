# clasificador.yml
# Fase 5+6 — Clasificador inteligente de artefactos
# Analiza cada archivo nuevo y decide: script / action / bot / doc / infra / zombie
# Resultado -> inbox/clasificado-FECHA.md para que Thdora lo lea

name: 🧠 Clasificador de Artefactos

on:
  push:
    branches: [main]
    paths-ignore:
      - 'inbox/**'
      - 'diarios/**'
      - '.github/workflows/**'

jobs:
  clasificar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detectar archivos nuevos (no modificados)
        id: nuevos
        run: |
          # Solo archivos NUEVOS (A = added), no modificados
          git diff --name-status HEAD~1 HEAD | grep '^A' | awk '{print $2}' > /tmp/nuevos.txt
          echo "Archivos nuevos:"
          cat /tmp/nuevos.txt
          COUNT=$(wc -l < /tmp/nuevos.txt)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Clasificar cada artefacto
        if: steps.nuevos.outputs.count > 0
        run: |
          DATE=$(date +%Y-%m-%d)
          TIME=$(date +%H:%M)
          RUN=$GITHUB_RUN_NUMBER
          REPORT="inbox/clasificado-${DATE}-${RUN}.md"

          cat > $REPORT << HEADER
          ---
          tags: [clasificador, auto, inbox]
          fecha: ${DATE}
          run: ${RUN}
          ---

          # 🧠 Clasificador — ${DATE} ${TIME} UTC

          **Commit:** \`${GITHUB_SHA:0:7}\`  
          **Autor:** $GITHUB_ACTOR

          HEADER

          SCRIPTS=0; ACTIONS=0; BOTS=0; DOCS=0; INFRA=0; ZOMBIES=0

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            TIPO="❓ desconocido"
            DESTINO="pendiente"
            ACCION="revisar manualmente"
            ALERTA=""

            # ─── REGLAS DE CLASIFICACIÓN ───

            # 1. ZOMBIE: script en sitio equivocado
            if [[ "$file" == *.sh && "$file" != scripts/* ]]; then
              TIPO="💀 ZOMBIE-SCRIPT"
              DESTINO="scripts/[subdir-correcto]/"
              ACCION="mover al subdirectorio correcto"
              ALERTA="⚠️ ALERTA: script fuera de scripts/"
              ((ZOMBIES++))

            # 2. GITHUB ACTION
            elif [[ "$file" == .github/workflows/*.yml ]]; then
              TIPO="⚡ github-action"
              DESTINO=".github/workflows/ ✔️ correcto"
              ACCION="documentar en SCRIPTS.md si no está"
              ((ACTIONS++))

            # 3. SCRIPT DE MANTENIMIENTO
            elif [[ "$file" == scripts/maintenance/*.sh ]]; then
              TIPO="🔧 script-maintenance"
              DESTINO="scripts/maintenance/ ✔️ correcto"
              ACCION="registrar en scripts/SCRIPTS.md"
              ((SCRIPTS++))

            # 4. SCRIPT DE THDORA/BOT
            elif [[ "$file" == scripts/thdora/*.sh ]]; then
              TIPO="🤖 script-bot"
              DESTINO="scripts/thdora/ ✔️ correcto"
              ACCION="documentar handler asociado en thdora"
              ((BOTS++))

            # 5. SCRIPT DE INFRA
            elif [[ "$file" == scripts/infra/*.sh ]]; then
              TIPO="🏗️ script-infra"
              DESTINO="scripts/infra/ ✔️ correcto"
              ACCION="verificar si necesita Docker o servicio"
              ((INFRA++))

            # 6. SCRIPT GENERICO EN LUGAR CORRECTO
            elif [[ "$file" == scripts/*.sh ]]; then
              TIPO="📜 script (sin subdir)"
              DESTINO="scripts/[subdir]/"
              ACCION="mover a subdirectorio: maintenance/infra/thdora/setup"
              ((SCRIPTS++))

            # 7. DOCUMENTACION
            elif [[ "$file" == docs/*.md ]]; then
              TIPO="📖 doc"
              DESTINO="docs/ ✔️ correcto"
              # Verificar frontmatter
              if [ -f "$file" ] && ! head -1 "$file" | grep -q '---'; then
                ACCION="⚠️ añadir frontmatter (tags/fecha)"
                ALERTA="Sin frontmatter"
              else
                ACCION="OK — verificar enlace desde HOME.md"
              fi
              ((DOCS++))

            # 8. MODULO NUEVO (carpeta con código Python/JS)
            elif [[ "$file" == src/**/*.py || "$file" == src/**/*.js ]]; then
              TIPO="🧩 modulo-codigo"
              DESTINO="src/"
              # Verificar si hay README en el modulo
              MODDIR=$(dirname "$file")
              if [ ! -f "${MODDIR}/README.md" ] && [ ! -f "${MODDIR}/__init__.py" ]; then
                ACCION="⚠️ módulo sin documentar — crear README.md en ${MODDIR}/"
                ALERTA="Módulo sin README"
              else
                ACCION="verificar si necesita Docker o repo propio"
              fi
              ((INFRA++))

            # 9. DOCKER / INFRA
            elif [[ "$file" == *docker-compose* || "$file" == *Dockerfile* ]]; then
              TIPO="🐳 docker"
              DESTINO="docker/ o raiz del servicio"
              ACCION="verificar si el servicio merece repo propio"
              ((INFRA++))

            # 10. ARCHIVO RAIZ SUELTO (posible zombie)
            elif [[ "$file" != *.md && "$file" != *.yml && "$file" != *.json && "$file" != *.gitignore && $(dirname "$file") == "." ]]; then
              TIPO="💀 ZOMBIE-RAIZ"
              DESTINO="desconocido"
              ACCION="clasificar manualmente o borrar"
              ALERTA="⚠️ Archivo suelto en raíz"
              ((ZOMBIES++))
            fi

            # Escribir resultado
            echo "### \`$file\`" >> $REPORT
            echo "- 🏷️ **Tipo:** $TIPO" >> $REPORT
            echo "- 📌 **Destino:** $DESTINO" >> $REPORT
            echo "- ⚙️ **Acción:** $ACCION" >> $REPORT
            [ -n "$ALERTA" ] && echo "- $ALERTA" >> $REPORT
            echo "" >> $REPORT

          done < /tmp/nuevos.txt

          # Resumen final
          echo "---" >> $REPORT
          echo "## 📊 Resumen" >> $REPORT
          echo "| Tipo | Count |" >> $REPORT
          echo "|------|-------|" >> $REPORT
          echo "| ⚡ GitHub Actions | $ACTIONS |" >> $REPORT
          echo "| 🔧 Scripts | $SCRIPTS |" >> $REPORT
          echo "| 🤖 Bot scripts | $BOTS |" >> $REPORT
          echo "| 🏗️ Infra/Docker | $INFRA |" >> $REPORT
          echo "| 📖 Docs | $DOCS |" >> $REPORT
          echo "| 💀 Zombies | $ZOMBIES |" >> $REPORT
          echo "" >> $REPORT

          if [ "$ZOMBIES" -gt 0 ]; then
            echo "## 🚨 ZOMBIES DETECTADOS — acción requerida" >> $REPORT
            echo "Thdora debe notificar por Telegram inmediatamente." >> $REPORT
          fi

          echo "" >> $REPORT
          echo "_Clasificado por thdora-guardian[bot] — ${DATE} ${TIME} UTC_" >> $REPORT

      - name: Commit clasificación
        run: |
          git config user.name "thdora-guardian[bot]"
          git config user.email "thdora@yggdrasil-dew.local"
          git add inbox/ || true
          git diff --cached --quiet || git commit -m "bot(clasificador): ${GITHUB_SHA:0:7} → inbox clasificado"
          git push
