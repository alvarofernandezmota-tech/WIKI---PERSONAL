name: 🔍 Repo Audit — On Push

on:
  push:
    paths:
      - 'ECOSISTEMA.md'
      - 'MAPA-ISLAS.md'
      - 'HERRAMIENTAS-ECOSISTEMA.md'
      - 'ROADMAP-MASTER.md'
      - 'docs/**'
      - 'templates/**'
      - 'scripts/**'
      - 'thdora/**'
      - 'osint/**'
      - 'docker/**'
      - 'infra/**'
      - 'inbox/**'
      - 'sesiones/**'

jobs:
  audit:
    name: Auditoría de archivos subidos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🧟 Detectar archivos zombie (0 bytes)
        id: zombie
        run: |
          ZOMBIES=$(find . -not -path './.git/*' -size 0 -name '*.md' -o -not -path './.git/*' -size 0 -name '*.yml' -o -not -path './.git/*' -size 0 -name '*.sh' 2>/dev/null | head -20)
          if [ -n "$ZOMBIES" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "list<<EOF" >> $GITHUB_OUTPUT
            echo "$ZOMBIES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: 📋 Verificar README en islas clave
        id: readme
        run: |
          MISSING=""
          for isla in thdora osint docker infra ollama hardware secops tools batcueva; do
            if [ -d "$isla" ] && [ ! -f "$isla/README.md" ]; then
              MISSING="$MISSING $isla"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "missing=$MISSING" >> $GITHUB_OUTPUT
          else
            echo "missing=" >> $GITHUB_OUTPUT
          fi

      - name: 📥 Verificar ficheros maestros existen
        id: masters
        run: |
          MISSING_MASTERS=""
          for f in ECOSISTEMA.md MAPA-ISLAS.md HERRAMIENTAS-ECOSISTEMA.md CONVENCIONES.md ROADMAP-MASTER.md; do
            [ ! -f "$f" ] && MISSING_MASTERS="$MISSING_MASTERS $f"
          done
          echo "missing=$MISSING_MASTERS" >> $GITHUB_OUTPUT

      - name: 📝 Verificar Conventional Commits
        id: commits
        run: |
          MSG=$(git log -1 --pretty=%s)
          if ! echo "$MSG" | grep -qE '^(feat|fix|docs|chore|refactor|style|test|ci|perf|revert)(\(.+\))?: .+'; then
            echo "invalid=true" >> $GITHUB_OUTPUT
            echo "msg=$MSG" >> $GITHUB_OUTPUT
          else
            echo "invalid=false" >> $GITHUB_OUTPUT
          fi

      - name: 🚨 Crear issue si hay problemas
        if: steps.zombie.outputs.found == 'true' || steps.readme.outputs.missing != '' || steps.masters.outputs.missing != '' || steps.commits.outputs.invalid == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const title = `🔍 Audit ${today} — Problemas detectados en push`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'audit'
            });
            if (existing.data.some(i => i.title === title)) {
              console.log('Issue ya existe, skip');
              return;
            }
            let body = `## 🔍 Auditoría automática — ${today}\n\n`;
            if ('${{ steps.zombie.outputs.found }}' === 'true') {
              body += `### 🧟 Archivos zombie (0 bytes)\n\`\`\`\n${{ steps.zombie.outputs.list }}\n\`\`\`\n\n`;
            }
            if ('${{ steps.readme.outputs.missing }}' !== '') {
              body += `### 📋 Islas sin README.md\n${{ steps.readme.outputs.missing }}\n\n`;
            }
            if ('${{ steps.masters.outputs.missing }}' !== '') {
              body += `### 📥 Ficheros maestros faltantes\n${{ steps.masters.outputs.missing }}\n\n`;
            }
            if ('${{ steps.commits.outputs.invalid }}' === 'true') {
              body += `### 📝 Commit no sigue Conventional Commits\n\`${{ steps.commits.outputs.msg }}\`\n\n`;
            }
            body += `---\n*Generado por repo-audit.yml*`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['audit']
            });

      - name: ✅ Resumen en log
        run: |
          echo "=== AUDIT SUMMARY ==="
          echo "Zombies: ${{ steps.zombie.outputs.found }}"
          echo "READMEs faltantes: ${{ steps.readme.outputs.missing }}"
          echo "Maestros faltantes: ${{ steps.masters.outputs.missing }}"
          echo "Commit válido: ${{ steps.commits.outputs.invalid == 'false' }}"
