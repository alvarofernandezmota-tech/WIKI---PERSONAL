# =============================================================================
# RESUMEN DIARIO — 08:00 CEST (06:00 UTC)
# Genera y envía resumen del estado del ecosistema a Telegram
# =============================================================================
name: 📊 Resumen Diario

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  resumen:
    name: Generar resumen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Contar pendientes en MASTER-PENDIENTES.md
        id: pendientes
        run: |
          if [ -f MASTER-PENDIENTES.md ]; then
            TOTAL=$(grep -c '\- \[ \]' MASTER-PENDIENTES.md 2>/dev/null || echo 0)
            DONE=$(grep -c '\- \[x\]' MASTER-PENDIENTES.md 2>/dev/null || echo 0)
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "done=$DONE" >> $GITHUB_OUTPUT
          fi

      - name: Enviar resumen a Telegram
        run: |
          if [ -n "${{ secrets.TELEGRAM_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            DATE=$(date '+%d/%m/%Y')
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d text="🌳 *Yggdrasil — Resumen $DATE*%0A%0A📋 Pendientes: ${{ steps.pendientes.outputs.total }}%0A✅ Completados: ${{ steps.pendientes.outputs.done }}%0A%0A_Resumen automático diario_" \
              -d parse_mode=Markdown
          fi
