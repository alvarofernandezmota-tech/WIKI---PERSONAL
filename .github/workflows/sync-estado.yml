# sync-estado.yml
# Fase 5 — Cron diario: sincroniza ESTADO-SISTEMA.md y limpia inbox procesada
# Se ejecuta cada día a las 02:00 UTC (04:00 CEST)

name: 🔄 Sync Estado Diario

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC = 04:00 CEST
  workflow_dispatch:       # También manual desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Actualizar fecha en ESTADO-SISTEMA.md
        run: |
          DATE=$(date '+%Y-%m-%d')
          TIME=$(date '+%H:%M')
          sed -i "s/^fecha-actualizacion:.*/fecha-actualizacion: ${DATE}T${TIME}/" ESTADO-SISTEMA.md
          sed -i "s/_Actualizado:.*/_Actualizado: ${DATE} ${TIME} UTC — sync automático GitHub Actions_/" ESTADO-SISTEMA.md

      - name: Contar archivos inbox pendientes
        id: inbox
        run: |
          COUNT=$(find inbox/ -name '*.md' 2>/dev/null | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Inbox pendiente: $COUNT archivos"

      - name: Actualizar contador inbox en ESTADO-SISTEMA.md
        run: |
          # Si hay más de 5 archivos en inbox, añadir alerta
          if [ "${{ steps.inbox.outputs.count }}" -gt 5 ]; then
            echo "⚠️ Inbox acumulada: ${{ steps.inbox.outputs.count }} archivos sin procesar" >> inbox/ALERTA-INBOX.md
          fi

      - name: Commit sync
        run: |
          git config user.name "thdora-guardian[bot]"
          git config user.email "thdora@yggdrasil-dew.local"
          git add ESTADO-SISTEMA.md inbox/ || true
          git diff --cached --quiet || git commit -m "bot(sync): estado diario $(date +%Y-%m-%d) — inbox:${{ steps.inbox.outputs.count }}"
          git push
