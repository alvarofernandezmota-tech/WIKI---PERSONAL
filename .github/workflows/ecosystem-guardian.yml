name: 🛡️ Ecosystem Guardian

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC diario
  workflow_dispatch:       # manual desde Telegram via API

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run ecosystem audit
        id: audit
        run: |
          python scripts/ci/ecosystem_audit.py \
            --repo-path . \
            --output docs/audits/AUDIT-$(date +%Y-%m-%d).json

      - name: Create issues from findings
        if: steps.audit.outputs.findings_count > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/ci/create_issues_from_audit.py \
            --audit-file docs/audits/AUDIT-$(date +%Y-%m-%d).json

      - name: Commit audit artifact
        run: |
          git config user.name 'ecosystem-guardian[bot]'
          git config user.email 'guardian@yggdrasil'
          git add docs/audits/
          git diff --staged --quiet || git commit -m "audit: ecosystem scan $(date +%Y-%m-%d)"
          git push

      - name: Notify Telegram (TOKI-DEW)
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TOKI_DEW_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SEVERITY=$(cat docs/audits/AUDIT-$(date +%Y-%m-%d).json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('severity','ok'))")
          if [ "$SEVERITY" != "ok" ]; then
            SUMMARY=$(cat docs/audits/AUDIT-$(date +%Y-%m-%d).json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('summary','Sin resumen'))")
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="🛡️ *Ecosystem Guardian* [$SEVERITY]%0A$SUMMARY" \
              -d parse_mode=Markdown
          fi
