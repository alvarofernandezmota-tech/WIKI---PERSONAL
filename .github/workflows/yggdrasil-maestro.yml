name: 🌳 Yggdrasil Maestro

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  clasificar-inbox:
    name: 📥 Clasificar Inbox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clasificar y mover archivos nuevos
        run: |
          set -e
          mkdir -p inbox/ideas inbox/proyectos inbox/recursos inbox/archive inbox/procesado
          MOVED=0

          find inbox/ -maxdepth 1 -type f \
            ! -name '.gitkeep' \
            ! -path 'inbox/_meta/*' 2>/dev/null | while read FILE; do

            BASENAME=$(basename "$FILE")
            NAME_LOWER=$(echo "$BASENAME" | tr '[:upper:]' '[:lower:]')
            DEST="inbox/procesado"

            case "$NAME_LOWER" in
              *idea*|*brainstorm*|*concept*)    DEST="inbox/ideas" ;;
              *proyecto*|*project*|*plan*)       DEST="inbox/proyectos" ;;
              *recurso*|*resource*|*ref*|*link*) DEST="inbox/recursos" ;;
              *archive*|*old*|*deprecated*)      DEST="inbox/archive" ;;
            esac

            echo "Moviendo $BASENAME → $DEST/"
            git mv "$FILE" "$DEST/$BASENAME" || mv "$FILE" "$DEST/$BASENAME"
            MOVED=$((MOVED + 1))
          done
          echo "Total movidos: $MOVED"

      - name: Commit si hay cambios
        run: |
          git config user.name  "yggdrasil-bot"
          git config user.email "bot@yggdrasil-dew"
          git add -A
          git diff --cached --quiet || git commit -m "📥 auto: clasificar inbox $(date +%Y-%m-%d)" && git push || true

  auditoria:
    name: 🔍 Auditoría Completa
    runs-on: ubuntu-latest
    needs: clasificar-inbox
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar reportes
        run: |
          FECHA=$(date +%Y-%m-%d)
          META="inbox/_meta"
          mkdir -p "$META"

          # audit-workflows
          echo "# Audit Workflows — $FECHA" > "$META/audit-workflows-$FECHA.md"
          echo "" >> "$META/audit-workflows-$FECHA.md"
          echo "| Archivo | Bytes | Estado |" >> "$META/audit-workflows-$FECHA.md"
          echo "|---------|-------|--------|" >> "$META/audit-workflows-$FECHA.md"
          for f in .github/workflows/*.yml; do
            SIZE=$(wc -c < "$f"); NAME=$(basename "$f")
            [ "$SIZE" -lt 200 ] && S="⚠️ STUB" || { [ "$SIZE" -lt 800 ] && S="🟡 Mínimo" || S="✅ Funcional"; }
            echo "| $NAME | $SIZE | $S |" >> "$META/audit-workflows-$FECHA.md"
          done

          # audit-scripts
          echo "# Audit Scripts — $FECHA" > "$META/audit-scripts-$FECHA.md"
          find inbox/_meta/ -name "*.sh" 2>/dev/null | while read s; do
            [ -x "$s" ] && echo "- ✅ \`$s\`" || echo "- ❌ \`$s\` (sin +x)"
          done >> "$META/audit-scripts-$FECHA.md"

          # audit-estructura
          echo "# Audit Estructura — $FECHA" > "$META/audit-estructura-$FECHA.md"
          echo '```' >> "$META/audit-estructura-$FECHA.md"
          find . -not -path './.git/*' | sort | head -100 >> "$META/audit-estructura-$FECHA.md"
          echo '```' >> "$META/audit-estructura-$FECHA.md"

          # audit-resumen
          TOTAL=$(ls .github/workflows/*.yml 2>/dev/null | wc -l)
          STUBS=$(for f in .github/workflows/*.yml; do [ "$(wc -c < "$f")" -lt 200 ] && echo "$f"; done | wc -l)
          FUNC=$((TOTAL - STUBS))
          SCORE=$(( TOTAL > 0 ? (FUNC * 100 / TOTAL) : 0 ))
          echo "# Audit Resumen — $FECHA" > "$META/audit-resumen-$FECHA.md"
          echo "" >> "$META/audit-resumen-$FECHA.md"
          echo "## Score: $SCORE/100" >> "$META/audit-resumen-$FECHA.md"
          echo "| Métrica | Valor |" >> "$META/audit-resumen-$FECHA.md"
          echo "|---------|-------|" >> "$META/audit-resumen-$FECHA.md"
          echo "| Workflows totales | $TOTAL |" >> "$META/audit-resumen-$FECHA.md"
          echo "| Funcionales | $FUNC |" >> "$META/audit-resumen-$FECHA.md"
          echo "| Stubs | $STUBS |" >> "$META/audit-resumen-$FECHA.md"

      - name: Commit reportes
        run: |
          git config user.name  "yggdrasil-bot"
          git config user.email "bot@yggdrasil-dew"
          git add inbox/_meta/audit-*.md
          git diff --cached --quiet || git commit -m "📊 audit: reportes $(date +%Y-%m-%d)" && git push || true
