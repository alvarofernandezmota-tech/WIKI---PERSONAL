# FUNCIÓN:   Actividad nocturna autónoma entre sesiones del humano
# TRIGGER:   Cron 00:00, 02:00, 04:00, 06:00 UTC
# AGENTE:    between-sessions
# ETIQUETAS: automatizacion
name: between-sessions

on:
  schedule:
    - cron: '0 0,2,4,6 * * *'
  workflow_dispatch:

jobs:
  between-sessions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Run between-sessions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YGGDRASIL_ROOT: ${{ github.workspace }}
        run: |
          chmod +x scripts/between-sessions.sh
          bash scripts/between-sessions.sh

      - name: Commit brief nocturno
        run: |
          git config user.name  "between-sessions[bot]"
          git config user.email "bot@yggdrasil-dew"
          git add diarios/ || true
          git diff --cached --quiet || git commit -m "chore: brief nocturno $(date +%Y-%m-%d) [AUTO]"
          git push || true
