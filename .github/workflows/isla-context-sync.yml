name: 🏝️ Isla Context Sync

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * *'  # 04:00 UTC = 06:00 CEST

jobs:
  sync-context:
    name: Sincronizar contexto de islas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 30

      - name: 📈 Generar MAPA-ISLAS.md automático
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const islas = [
              'thdora', 'osint', 'docker', 'infra', 'ollama',
              'hardware', 'secops', 'tools', 'batcueva', 'theodora'
            ];

            let rows = '';
            for (const isla of islas) {
              let hasReadme = false;
              let hasEstado = false;
              let lastCommit = 'N/A';
              try {
                await github.rest.repos.getContent({
                  owner: context.repo.owner, repo: context.repo.repo,
                  path: `${isla}/README.md`
                });
                hasReadme = true;
              } catch(e) {}
              try {
                await github.rest.repos.getContent({
                  owner: context.repo.owner, repo: context.repo.repo,
                  path: `${isla}/ESTADO.md`
                });
                hasEstado = true;
              } catch(e) {}
              try {
                const commits = await github.rest.repos.listCommits({
                  owner: context.repo.owner, repo: context.repo.repo,
                  path: isla, per_page: 1
                });
                if (commits.data.length > 0) {
                  lastCommit = commits.data[0].commit.committer.date.split('T')[0];
                }
              } catch(e) {}

              const readmeStatus = hasReadme ? '✅' : '❌';
              const estadoStatus = hasEstado ? '✅' : '❌';
              rows += `| ${isla} | ${readmeStatus} | ${estadoStatus} | ${lastCommit} |\n`;
            }

            const today = new Date().toISOString().split('T')[0];
            const content = `# 🗺️ Mapa de Islas — Yggdrasil\n\n> Generado automáticamente por isla-context-sync.yml\n> Última actualización: ${today}\n\n## Estado de islas\n\n| Isla | README | ESTADO | Último commit |\n|---|---|---|---|\n${rows}\n---\n*Para añadir una isla: crear carpeta + README con plantilla \`templates/isla-README.md\`*\n`;
            const encoded = Buffer.from(content).toString('base64');

            try {
              const existing = await github.rest.repos.getContent({
                owner: context.repo.owner, repo: context.repo.repo,
                path: 'MAPA-ISLAS.md'
              });
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner, repo: context.repo.repo,
                path: 'MAPA-ISLAS.md',
                message: `chore: sync mapa islas ${today}`,
                content: encoded, sha: existing.data.sha
              });
            } catch(e) {
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner, repo: context.repo.repo,
                path: 'MAPA-ISLAS.md',
                message: `docs: crear mapa islas ${today}`,
                content: encoded
              });
            }
            console.log('MAPA-ISLAS.md actualizado');
