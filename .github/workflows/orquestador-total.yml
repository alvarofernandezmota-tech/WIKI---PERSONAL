name: Orquestador Total

on:
  schedule:
    - cron: '0 6 * * *'  # Diario a las 06:00 UTC
  workflow_dispatch:
    inputs:
      fase:
        description: 'Fase a ejecutar (all/audit/inbox/health)'
        required: false
        default: 'all'

jobs:
  orquestador:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar entorno
        run: |
          echo "YGGDRASIL_ROOT=$(pwd)" >> $GITHUB_ENV
          chmod +x scripts/*.sh scripts/agentes/*.sh scripts/ingest/*.sh 2>/dev/null || true
          chmod +x agentes/*/test.sh 2>/dev/null || true

      - name: Ejecutar orquestador
        run: bash scripts/orquestador-total.sh "${{ github.event.inputs.fase || 'all' }}"

      - name: Subir reporte
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orquestador-report-${{ github.run_id }}
          path: reports/
          retention-days: 30

      - name: Abrir issue si hay advertencias
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Orquestador] Fallo detectado — ${new Date().toISOString().slice(0,10)}`,
              body: `El orquestador detectó errores en la ejecución. Ver artifacts del run #${context.runId}.`,
              labels: ['automated', 'audit']
            })
