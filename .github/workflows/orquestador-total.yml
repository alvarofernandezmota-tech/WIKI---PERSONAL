name: Orquestador Total

on:
  schedule:
    - cron: '0 6 * * *'  # Cada día a las 06:00 UTC
  workflow_dispatch:
    inputs:
      modo:
        description: 'Modo de orquestación'
        required: false
        default: 'completo'
        type: choice
        options:
          - completo
          - rapido
          - solo-auditoria

jobs:
  orquestar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python (para MCP server si necesario)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar Orquestador Total
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/orquestador-total.sh
          bash scripts/orquestador-total.sh "${{ github.event.inputs.modo || 'completo' }}"

      - name: Commit reportes
        run: |
          git config user.name "thdora-guardian[bot]"
          git config user.email "bot@yggdrasil-dew"
          git add inbox/ diary/ || true
          git diff --staged --quiet || git commit -m "chore: reporte orquestador $(date +%Y-%m-%d)"
          git push || true
