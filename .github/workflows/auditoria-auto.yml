name: 🔍 Auditoría Automática

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  auditoria:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ejecutar auditoría maestra
        run: bash scripts/auditoria-maestra.sh || true

      - name: Commit reporte
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add inbox/_meta/ || true
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "chore(auditoria): reporte automático $(date +%Y-%m-%dT%H:%M:%S)"
            git push
          fi
