name: Meta Deep Draft PRs
on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:
jobs:
  meta-draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run meta deep
        run: bash scripts/agentes/agente-meta-deep.sh
      - name: Collect drafts
        run: |
          mkdir -p tmp/drafts
          cp reports/drafts/*.json tmp/drafts/ || true
      - name: Upload drafts
        uses: actions/upload-artifact@v4
        with:
          name: draft-prs
          path: tmp/drafts
