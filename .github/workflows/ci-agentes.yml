name: CI Agentes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Crear carpetas necesarias
        run: |
          mkdir -p reports/verify logs agentes

      - name: Ejecutar smoke tests
        run: bash scripts/verify/run-smoke-tests.sh

      - name: Upload resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-tests-${{ github.run_id }}
          path: reports/verify/
          if-no-files-found: ignore
