name: CI Agentes

on:
  push:
    branches: [main]
    paths:
      - 'agentes/**'
      - 'scripts/agentes/**'
      - 'mcp/**'
  pull_request:
    paths:
      - 'agentes/**'
      - 'scripts/agentes/**'
      - 'mcp/**'

jobs:
  test-agentes:
    runs-on: ubuntu-latest
    env:
      YGGDRASIL_ROOT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Make test scripts executable
        run: |
          find agentes -name 'test.sh' -exec chmod +x {} \;
          find scripts/agentes -name '*.sh' -exec chmod +x {} \;

      - name: Run agent-docs test
        run: bash agentes/agent-docs/test.sh

      - name: Run agent-islas test
        run: bash agentes/agent-islas/test.sh

      - name: Run agent-tareas test
        run: bash agentes/agent-tareas/test.sh

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-test-reports
          path: reports/
          if-no-files-found: ignore
