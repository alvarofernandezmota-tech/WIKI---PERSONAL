# FUNCIÓN:   Ejecutar el orquestador supremo diariamente
# TRIGGER:   Cron diario 06:00 UTC + manual
# AGENTE:    orquestador-supremo
# ETIQUETAS: automatizacion, orquestador
name: orquestador-supremo

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  orquestador:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Run orquestador supremo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YGGDRASIL_ROOT: ${{ github.workspace }}
        run: |
          chmod +x scripts/orquestador-supremo.sh
          bash scripts/orquestador-supremo.sh

      - name: Commit reportes
        run: |
          git config user.name  "orquestador-supremo[bot]"
          git config user.email "bot@yggdrasil-dew"
          git add reports/ diarios/ || true
          git diff --cached --quiet || git commit -m "chore: orquestador-supremo report $(date +%Y-%m-%d) [AUTO]"
          git push || true
