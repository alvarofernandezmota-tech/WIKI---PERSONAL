# ==============================================================
# HEALTH CHECK
# Trigger: cron cada 30min + workflow_dispatch
# Rol: verificar que los workflows del repo están corriendo
#      y crear alerta en inbox si algo falla
# Nota: el health completo de Madre (Docker, servicios)
#       lo hará el health-agent-core via SSH (próximamente)
# ==============================================================
name: health-check

on:
  schedule:
    - cron: '*/30 * * * *'  # cada 30 minutos
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar últimas ejecuciones de workflows
        id: workflow_health
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          TIME=$(date +%H:%M)
          ISSUES=""

          # Comprobar si workflows críticos han fallado recientemente
          for WF in inbox-dispatcher repo-research-on-push; do
            STATUS=$(gh run list --workflow="${WF}.yml" --limit 1 --json conclusion \
              --jq '.[0].conclusion' 2>/dev/null || echo "unknown")
            echo "Workflow $WF: $STATUS"
            if [ "$STATUS" = "failure" ]; then
              ISSUES="$ISSUES\n- Workflow \`$WF\` ha fallado"
            fi
          done

          if [ -n "$ISSUES" ]; then
            echo "has_issues=true" >> $GITHUB_OUTPUT
            echo "issues=$ISSUES" >> $GITHUB_OUTPUT
          else
            echo "has_issues=false" >> $GITHUB_OUTPUT
          fi
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "time=$TIME" >> $GITHUB_OUTPUT

      - name: Generar alerta en inbox/ si hay problemas
        if: steps.workflow_health.outputs.has_issues == 'true'
        run: |
          DATE=${{ steps.workflow_health.outputs.date }}
          TIME=${{ steps.workflow_health.outputs.time }}
          FILE="inbox/${DATE}-health-alert.md"
          mkdir -p inbox
          cat > "$FILE" << EOF
          ---
          type: alert
          date: ${DATE}
          hora: ${TIME}
          source: health-check-action
          priority: high
          status: pending
          processed_by: pending
          title: Health alert — workflows fallidos
          ---

          # Health Alert — ${DATE} ${TIME}

          ## Problemas detectados

          ${{ steps.workflow_health.outputs.issues }}

          ## Acción requerida

          - [ ] Revisar logs de workflows en GitHub Actions
          - [ ] Ejecutar `bash scripts/repo-research.sh` en Madre

          *Generado por health-check-action [AUTO]*
          EOF

          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add "$FILE"
          git commit -m "alert(inbox): health-check ${DATE} ${TIME} [AUTO]"
          git push
