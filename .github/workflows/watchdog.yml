name: Watchdog — Health Check

on:
  schedule:
    - cron: '*/30 * * * *'  # Cada 30 minutos
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar entorno
        run: |
          echo "YGGDRASIL_ROOT=$(pwd)" >> $GITHUB_ENV
          chmod +x scripts/*.sh 2>/dev/null || true

      - name: Health check
        run: |
          echo "=== HEALTH CHECK $(date -Iseconds) ==="
          # Verificar estructura crítica
          for dir in mcp scripts agentes tools .github/workflows; do
            [ -d "$dir" ] && echo "✅ $dir" || echo "❌ $dir MISSING"
          done
          # Verificar archivos clave
          for f in mcp/server.py scripts/agentes/llm-router.sh scripts/agentes/agente-meta-deep.sh; do
            [ -f "$f" ] && echo "✅ $f" || echo "❌ $f MISSING"
          done
          echo "=== END HEALTH CHECK ==="
