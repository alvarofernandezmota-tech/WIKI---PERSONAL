name: Autonomous Ecosystem Cron
# ================================================================
# Ejecuta tareas autónomas periódicas aunque tú no trabajemos.
# Cada parte del ecosistema se mantiene sola.
# ================================================================

on:
  schedule:
    # Lunes, miércoles, viernes — 09:00 UTC
    - cron: '0 9 * * 1,3,5'
    # Cada día — 02:00 UTC (mantenimiento nocturno)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Tarea a ejecutar (all / analysis / cleanup / research)'
        required: false
        default: 'all'

jobs:
  # ------------------------------------------------------------------
  # JOB 1: Limpieza y análisis del inbox
  # ------------------------------------------------------------------
  inbox-maintenance:
    name: Inbox Maintenance
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "yggdrasil-bot"
          git config user.email "bot@yggdrasil.local"

      - name: Count inbox files
        id: inbox
        run: |
          COUNT=$(find inbox/ -maxdepth 1 -name '*.md' \
            ! -name 'README.md' ! -name 'PLANTILLA*.md' ! -name 'APLAZADO*.md' \
            ! -name 'SIGUIENTE*.md' ! -name 'PENDIENTES*.md' ! -name 'PLAN-*.md' \
            | wc -l | tr -d ' ')
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Inbox count: $COUNT"

      - name: Archive if overflow (>10)
        if: ${{ steps.inbox.outputs.count > 10 }}
        run: |
          mkdir -p inbox/archive
          DATE=$(date +%Y-%m-%d)
          MOVED=0
          for f in inbox/audit-*.md inbox/clasificado-*.md; do
            [ -f "$f" ] || continue
            mv "$f" "inbox/archive/"
            MOVED=$((MOVED + 1))
          done
          if [ "$MOVED" -gt 0 ]; then
            git add -A
            git commit -m "chore(inbox): auto-cleanup $DATE — $MOVED archivos archivados [AUTO]"
            git push
            echo "Archivados: $MOVED ficheros"
          fi

  # ------------------------------------------------------------------
  # JOB 2: Generación de informe de investigación semanal
  # ------------------------------------------------------------------
  research-report:
    name: Weekly Research Report
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Solo lunes
    if: github.event.schedule == '0 9 * * 1,3,5' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "yggdrasil-bot"
          git config user.email "bot@yggdrasil.local"

      - name: Generate research summary
        run: |
          DATE=$(date +%Y-%m-%d)
          WEEK=$(date +%V)
          INBOX_COUNT=$(find inbox/ -maxdepth 1 -name '*.md' ! -name 'README*' | wc -l | tr -d ' ')
          DIARY_COUNT=$(find diary/ -name '*.md' ! -name 'README*' 2>/dev/null | wc -l | tr -d ' ')
          ACTIONS_COUNT=$(find .github/workflows/ -name '*.yml' | wc -l | tr -d ' ')
          SCRIPTS_COUNT=$(find scripts/ -name '*.sh' 2>/dev/null | wc -l | tr -d ' ')
          AGENTS_COUNT=$(find agentes/ -name '*.py' -o -name '*.md' 2>/dev/null | wc -l | tr -d ' ')

          cat > "inbox/${DATE}-autonomous-report-W${WEEK}.md" << EOF
          ---
          date: ${DATE}
          semana: W${WEEK}
          tipo: autonomous-report
          generado: GitHub Actions [AUTO]
          ---

          # Informe Autónomo — Semana ${WEEK} (${DATE})

          ## Estado del ecosistema

          | Métrica | Valor |
          |---------|-------|
          | Ficheros inbox | ${INBOX_COUNT} |
          | Entradas diary | ${DIARY_COUNT} |
          | GitHub Actions | ${ACTIONS_COUNT} |
          | Scripts .sh | ${SCRIPTS_COUNT} |
          | Ficheros agentes | ${AGENTS_COUNT} |

          ## Últimos commits

          $(git log --oneline -10)

          ## Pendientes detectados (inbox)

          $(find inbox/ -maxdepth 1 -name '*.md' ! -name 'README*' ! -name 'PLANTILLA*' | head -10 | xargs -I{} basename {} 2>/dev/null || echo 'Inbox vacía')

          ## Próximas tareas sugeridas [AUTO]

          - Revisar ROADMAP-MASTER.md para tareas \`[AUTO]\` pendientes
          - Ejecutar reality-check en Madre
          - Sincronizar: \`git reset --hard origin/main\`

          ---
          *Generado automáticamente por autonomous-cron.yml [AUTO]*
          EOF

      - name: Commit report
        run: |
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore(report): informe autónomo W$(date +%V) $(date +%Y-%m-%d) [AUTO]"
            git push
          fi

  # ------------------------------------------------------------------
  # JOB 3: Análisis de estructura del repo
  # ------------------------------------------------------------------
  structure-analysis:
    name: Repo Structure Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Solo en cron nocturno (02:00 UTC)
    if: github.event.schedule == '0 2 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "yggdrasil-bot"
          git config user.email "bot@yggdrasil.local"

      - name: Analyze repo structure
        run: |
          DATE=$(date +%Y-%m-%d)
          TIME=$(date +%H:%M)
          FALLOS=0
          INFORME="inbox/${DATE}-structure-check.md"

          # Verificar ficheros clave
          MISSING=""
          for F in ROADMAP-MASTER.md agentes/REGLAS-AGENTES.md agentes/MACRO-SPEC-ECOSISTEMA.md \
                   scripts/cierre-sesion.sh scripts/apertura-sesion.sh \
                   scripts/maintenance/inbox-audit-cleanup.sh \
                   scripts/maintenance/ecosystem-reality-check.sh \
                   scripts/maintenance/repo-analyzer.sh; do
            if [ ! -f "$F" ]; then
              MISSING="${MISSING}\n- FALTA: $F"
              FALLOS=$((FALLOS + 1))
            fi
          done

          # Verificar Actions
          for WF in inbox-cleanup.yml reality-check.yml autonomous-cron.yml; do
            if [ ! -f ".github/workflows/$WF" ]; then
              MISSING="${MISSING}\n- Action FALTA: $WF"
              FALLOS=$((FALLOS + 1))
            fi
          done

          STATUS=$([ $FALLOS -gt 0 ] && echo "WARN" || echo "OK")

          cat > "$INFORME" << EOF
          ---
          date: ${DATE}
          hora: ${TIME}
          tipo: structure-check
          status: ${STATUS}
          fallos: ${FALLOS}
          ---

          # Structure Check — ${DATE} ${TIME}

          **Estado:** ${STATUS} | **Fallos:** ${FALLOS}

          ## Items faltantes

          $([ -n "$MISSING" ] && echo -e "$MISSING" || echo 'Ninguno — estructura completa')

          ## Estadísticas

          - Actions: $(find .github/workflows/ -name '*.yml' | wc -l | tr -d ' ')
          - Scripts: $(find scripts/ -name '*.sh' 2>/dev/null | wc -l | tr -d ' ')
          - Docs diary: $(find diary/ -name '*.md' 2>/dev/null | wc -l | tr -d ' ')
          - Inbox: $(find inbox/ -maxdepth 1 -name '*.md' ! -name 'README*' | wc -l | tr -d ' ') ficheros

          ---
          *Generado por autonomous-cron.yml [AUTO]*
          EOF

      - name: Commit analysis
        run: |
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore(structure): structure-check $(date +%Y-%m-%d) [AUTO]"
            git push
          fi
