# FUNCIÓN:   Validar MAPA-ISLAS.md vs carpetas reales en cada push
# TRIGGER:   Push a main + manual
# AGENTE:    isla-sync-validator
# ETIQUETAS: estructura, islas
name: isla-sync-validator

on:
  push:
    branches: [main]
    paths:
      - 'islas/**'
      - 'MAPA-ISLAS.md'
  workflow_dispatch:

jobs:
  isla-sync:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Run isla-sync-validator
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YGGDRASIL_ROOT: ${{ github.workspace }}
        run: |
          chmod +x scripts/isla-sync-validator.sh
          bash scripts/isla-sync-validator.sh || true
