name: context-reminder

on:
  schedule:
    # Lunes 08:00 UTC = 09:00/10:00 CEST
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  check-context:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Comprobar antigüedad CONTEXT.md
        id: check
        run: |
          LAST_MOD=$(git log -1 --format="%ct" -- CONTEXT.md)
          NOW=$(date +%s)
          DAYS=$(( (NOW - LAST_MOD) / 86400 ))
          echo "days=$DAYS" >> $GITHUB_OUTPUT
          echo "CONTEXT.md modificado hace $DAYS días"

      - name: Abrir issue de recordatorio si >7 días
        if: ${{ fromJson(steps.check.outputs.days) > 7 }}
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "📋 CONTEXT.md lleva ${{ steps.check.outputs.days }} días sin actualizar"
          labels: docs, p2-normal
          body: |
            **CONTEXT.md** no ha sido actualizado en **${{ steps.check.outputs.days }} días**.

            Actualiza el archivo con:
            - Estado actual del ecosistema
            - Última sesión completada
            - Próximo paso más importante

            → [Abrir CONTEXT.md](https://github.com/alvarofernandezmota-tech/yggdrasil-dew/blob/main/CONTEXT.md)
