name: 🗺️ Mapa Islas Sync

on:
  issues:
    types: [opened, closed, reopened]
  pull_request:
    types: [opened, closed, merged]
  push:
    paths:
      - 'ECOSISTEMA.md'
      - 'MAPA-ISLAS.md'
      - 'HERRAMIENTAS-ECOSISTEMA.md'

jobs:
  sync-mapa:
    name: Actualizar timestamp del mapa
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Actualizar fecha en MAPA-ISLAS.md
        run: |
          FECHA=$(date '+%d-%b-%Y %H:%M CEST')
          if [ -f MAPA-ISLAS.md ]; then
            sed -i "s/Ultima actualizacion: \*\*.*\*\*/Ultima actualizacion: **${FECHA}**/" MAPA-ISLAS.md
            echo "✅ Timestamp actualizado: ${FECHA}"
          fi

      - name: Detectar isla afectada por el evento
        run: |
          EVENT="${{ github.event_name }}"
          TITLE="${{ github.event.issue.title }}${{ github.event.pull_request.title }}"
          echo "Evento: $EVENT"
          echo "Titulo: $TITLE"
          # Detectar isla por keywords en el titulo
          for isla in thdora secops batcueva local-brain osint-stack madre theodora; do
            if echo "$TITLE" | grep -qi "$isla"; then
              echo "ISLA_AFECTADA=$isla" >> $GITHUB_ENV
              echo "🏝️ Isla detectada: $isla"
            fi
          done

      - name: Commit sync
        run: |
          git config user.name "ygg-ecosystem-bot"
          git config user.email "bot@yggdrasil-dew"
          git add MAPA-ISLAS.md
          git diff --staged --quiet || git commit -m "chore: sync mapa-islas timestamp [${{ github.event_name }}]"
          git push
