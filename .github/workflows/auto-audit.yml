# auto-audit.yml
# Ejecuta AUDITORIA-COPILOT.sh automáticamente:
#   - En cada push a main
#   - Cada domingo a las 03:00 UTC
#   - Manualmente desde Actions > Run workflow

name: 🔍 Auto-Auditoría Repo

on:
  push:
    branches: [main]
    paths-ignore:
      - 'inbox/_meta/audit-*.md'   # evitar loop infinito
      - 'docs/**'
  schedule:
    - cron: '0 3 * * 0'            # domingo 03:00 UTC
  workflow_dispatch:               # trigger manual

jobs:
  auditoria:
    name: Ejecutar auditoría
    runs-on: ubuntu-latest
    permissions:
      contents: write              # necesario para git push de reportes

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔐 Configurar git
        run: |
          git config user.name  "copilot-audit[bot]"
          git config user.email "copilot-audit[bot]@users.noreply.github.com"

      - name: 🔍 Ejecutar auditoría
        run: |
          chmod +x inbox/_meta/AUDITORIA-COPILOT.sh
          bash inbox/_meta/AUDITORIA-COPILOT.sh

      - name: 📤 Commit y push de reportes
        run: |
          FECHA=$(date +%Y-%m-%d)
          git add inbox/_meta/audit-*.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "ℹ️ Sin cambios en reportes — nada que commitear"
          else
            git commit -m "audit($FECHA): reportes automáticos via GitHub Actions [skip ci]"
            git push
          fi
