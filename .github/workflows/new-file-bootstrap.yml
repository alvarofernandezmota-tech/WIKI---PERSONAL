name: 📦 New File Bootstrap

# Cuando se crea un archivo nuevo, le inyecta la plantilla correcta
# según su ruta y extensión
on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.py'
      - 'scripts/**/*.sh'
      - 'scripts/**/*.py'
      - '.github/workflows/**/*.yml'

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # necesitamos el commit anterior para ver archivos nuevos

      - name: Detect new files
        id: detect
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD)
          echo "new_files<<EOF" >> $GITHUB_OUTPUT
          echo "$NEW_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Inject ecosystem header if missing
        run: |
          python scripts/ci/inject_ecosystem_header.py \
            --files "${{ steps.detect.outputs.new_files }}"

      - name: Commit if headers were injected
        run: |
          git config user.name 'ecosystem-guardian[bot]'
          git config user.email 'guardian@yggdrasil'
          git add -A
          git diff --staged --quiet || git commit -m "chore: inject ecosystem headers into new files"
          git push
