name: 🤖 Auto-investigación nocturna

on:
  schedule:
    - cron: '30 2 * * *'  # 02:30 UTC = 04:30 CEST
  workflow_dispatch:

jobs:
  auto-research:
    name: Investigación automática del ecosistema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 30

      - name: 📈 Analizar velocidad del ecosistema
        id: velocity
        run: |
          WEEK_COMMITS=$(git log --since='7 days ago' --oneline | wc -l)
          TODAY_COMMITS=$(git log --since='1 day ago' --oneline | wc -l)
          WEEK_FILES=$(git log --since='7 days ago' --name-only --pretty=format:'' | sort -u | grep -v '^$' | wc -l)
          echo "week_commits=$WEEK_COMMITS" >> $GITHUB_OUTPUT
          echo "today_commits=$TODAY_COMMITS" >> $GITHUB_OUTPUT
          echo "week_files=$WEEK_FILES" >> $GITHUB_OUTPUT

      - name: 🔎 Detectar islas sin actividad esta semana
        id: stale
        run: |
          STALE=""
          for isla in thdora osint docker infra ollama hardware secops tools; do
            if [ -d "$isla" ]; then
              LAST=$(git log --since='7 days ago' --oneline -- "$isla/" | wc -l)
              if [ "$LAST" -eq 0 ]; then
                STALE="$STALE $isla"
              fi
            fi
          done
          echo "stale=$STALE" >> $GITHUB_OUTPUT

      - name: 📝 Detectar TODOs sin issue
        id: todos
        run: |
          TODOS=$(grep -rn 'TODO\|FIXME\|HACK\|XXX' --include='*.md' --include='*.py' --include='*.js' --include='*.sh' . 2>/dev/null | grep -v '.git' | head -20)
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "${TODOS:-Ninguno detectado}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 📄 Detectar documentación desactualizada
        id: stale_docs
        run: |
          # Ficheros .md no tocados en >30 días
          STALE_DOCS=$(find . -name '*.md' -not -path './.git/*' -mtime +30 2>/dev/null | head -10)
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "${STALE_DOCS:-Ninguno}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 📊 Generar informe de investigación
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const title = `🤖 Auto-investigación ${today}`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'auto-research'
            });
            if (existing.data.some(i => i.title === title)) return;

            const weekCommits = '${{ steps.velocity.outputs.week_commits }}';
            const todayCommits = '${{ steps.velocity.outputs.today_commits }}';
            const weekFiles = '${{ steps.velocity.outputs.week_files }}';
            const stale = '${{ steps.stale.outputs.stale }}';
            const todos = `${{ steps.todos.outputs.list }}`;
            const staleDocs = `${{ steps.stale_docs.outputs.list }}`;

            let body = `## 🤖 Informe de investigación automática — ${today}\n\n`;
            body += `### 📈 Velocidad del ecosistema\n`;
            body += `- Commits esta semana: **${weekCommits}**\n`;
            body += `- Commits hoy: **${todayCommits}**\n`;
            body += `- Archivos modificados esta semana: **${weekFiles}**\n\n`;

            if (stale && stale.trim()) {
              body += `### 💤 Islas sin actividad esta semana\n${stale.split(' ').filter(Boolean).map(i => `- ${i}`).join('\n')}\n\n`;
            }

            if (todos !== 'Ninguno detectado') {
              body += `### 📝 TODOs detectados\n\`\`\`\n${todos}\n\`\`\`\n\n`;
            }

            if (staleDocs !== 'Ninguno') {
              body += `### 📄 Documentación sin tocar >30 días\n\`\`\`\n${staleDocs}\n\`\`\`\n\n`;
            }

            body += `---\n*Generado por auto-investigacion.yml a las 04:30 CEST*\n*Ver \`docs/MONITOREO-ECOSISTEMA.md\` para contexto completo.*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['auto-research']
            });
