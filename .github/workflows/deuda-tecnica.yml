# =============================================================
# FUNCIÓN:   Ejecuta struct-auditor y ghost-detector cada semana
#            y genera un informe consolidado de deuda técnica.
#            Abre issues para cada deuda detectada.
# TRIGGER:   schedule dominical 02:00 / workflow_dispatch
# ETIQUETAS: deuda-tecnica, estructura, duplicado
# DEPS:      scripts/struct-auditor.sh, scripts/ghost-file-detector.sh
# =============================================================

name: 🔴 Deuda Técnica — Auditoría Semanal

on:
  schedule:
    - cron: '0 2 * * 0'  # domingos a las 02:00 UTC
  workflow_dispatch:

jobs:
  auditar-deuda:
    name: Auditoría completa de deuda técnica
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar git
        run: |
          git config user.name  "thdora-deuda[bot]"
          git config user.email "thdora-deuda[bot]@users.noreply.github.com"

      - name: Ejecutar struct-auditor
        run: |
          chmod +x scripts/struct-auditor.sh
          bash scripts/struct-auditor.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ejecutar ghost-file-detector
        run: |
          chmod +x scripts/ghost-file-detector.sh
          bash scripts/ghost-file-detector.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar informe consolidado
        run: |
          FECHA=$(date +%Y-%m-%d)
          cat > diarios/deuda-consolidada-$FECHA.md << EOF
          # 🔴 DEUDA TÉCNICA CONSOLIDADA — $FECHA

          ## Struct Audit
          $(cat diarios/struct-audit-$FECHA.md 2>/dev/null || echo 'No generado')

          ## Ghost Detector
          $(cat diarios/ghost-detector-$FECHA.md 2>/dev/null || echo 'No generado')

          ---
          *Generado por deuda-tecnica.yml [AUTO]*
          EOF

      - name: Commit informes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "chore: [AUTO] deuda-tecnica audit $(date +%Y-%m-%d)"
            git push
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
