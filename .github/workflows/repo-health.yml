name: 🛡️ Repo Health — Nocturno

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC = 05:00 CEST
  workflow_dispatch:

jobs:
  health:
    name: Health check ecosistema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📅 Verificar diario del día
        id: diary
        run: |
          TODAY=$(date +%Y-%m-%d)
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          DIARY="diario/$YEAR/$MONTH/$TODAY.md"
          if [ ! -f "$DIARY" ]; then
            echo "missing=true" >> $GITHUB_OUTPUT
            echo "path=$DIARY" >> $GITHUB_OUTPUT
          else
            echo "missing=false" >> $GITHUB_OUTPUT
          fi

      - name: 🏝️ Auditar README por isla
        id: islas
        run: |
          MISSING=""
          for isla in thdora osint docker infra ollama hardware secops tools batcueva; do
            if [ -d "$isla" ] && [ ! -f "$isla/README.md" ]; then
              MISSING="$MISSING\n- [ ] $isla/README.md"
            fi
          done
          echo "missing<<EOF" >> $GITHUB_OUTPUT
          echo -e "$MISSING" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🧟 Auditar zombies globales
        id: zombies
        run: |
          Z=$(find . -not -path './.git/*' \( -name '*.md' -o -name '*.yml' -o -name '*.sh' \) -size 0 2>/dev/null)
          if [ -n "$Z" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "list<<EOF" >> $GITHUB_OUTPUT
            echo "$Z" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: 🏝️ Detectar islas sin actividad >7 días
        id: islands_old
        run: |
          STALE=""
          LIMIT=$(date -d '7 days ago' +%s 2>/dev/null || date -v-7d +%s)
          for isla in thdora osint docker infra ollama hardware secops tools; do
            if [ -d "$isla" ]; then
              LAST=$(git log -1 --format='%ct' -- "$isla/" 2>/dev/null || echo 0)
              if [ -n "$LAST" ] && [ "$LAST" -lt "$LIMIT" ]; then
                DAYS=$(( ($(date +%s) - LAST) / 86400 ))
                STALE="$STALE\n- **$isla** — sin cambios hace ${DAYS}d"
              fi
            fi
          done
          echo "stale<<EOF" >> $GITHUB_OUTPUT
          echo -e "$STALE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🚨 Crear issue health si hay alertas
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const title = `🛡️ Health ${today} — Informe nocturno`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health'
            });
            if (existing.data.some(i => i.title === title)) return;
            let problems = false;
            let body = `## 🛡️ Health Check — ${today}\n\n`;
            if ('${{ steps.diary.outputs.missing }}' === 'true') {
              body += `### 📅 Diario faltante\nNo existe: \`${{ steps.diary.outputs.path }}\`\n\n`;
              problems = true;
            }
            if ('${{ steps.islas.outputs.missing }}' !== '') {
              body += `### 🏝️ Islas sin README.md\n${{ steps.islas.outputs.missing }}\n\n`;
              problems = true;
            }
            if ('${{ steps.zombies.outputs.found }}' === 'true') {
              body += `### 🧟 Archivos zombie\n\`\`\`\n${{ steps.zombies.outputs.list }}\n\`\`\`\n\n`;
              problems = true;
            }
            if ('${{ steps.islands_old.outputs.stale }}' !== '') {
              body += `### 🏝️ Islas sin actividad reciente\n${{ steps.islands_old.outputs.stale }}\n\n`;
              problems = true;
            }
            if (!problems) {
              body += `✅ Todo en orden. Ecosistema sano.\n`;
            }
            body += `\n---\n*Generado por repo-health.yml a las 05:00 CEST*`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: problems ? ['health', 'needs-attention'] : ['health']
            });
