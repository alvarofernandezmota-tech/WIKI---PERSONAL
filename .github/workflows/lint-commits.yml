name: lint-commits

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validar formato Conventional Commits
        run: |
          # Obtener commits del PR o el último commit del push
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            COMMITS=$(git log --format="%s" origin/${{ github.base_ref }}..HEAD)
          else
            COMMITS=$(git log --format="%s" -5)
          fi

          echo "Commits a validar:"
          echo "$COMMITS"

          PATTERN="^(feat|fix|docs|chore|infra|security|migration|refactor|test|style)(\(.+\))?: .+"
          FAIL=0

          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            if ! echo "$msg" | grep -qE "$PATTERN"; then
              echo "❌ Commit no cumple Conventional Commits: $msg"
              FAIL=1
            else
              echo "✅ OK: $msg"
            fi
          done <<< "$COMMITS"

          if [ $FAIL -eq 1 ]; then
            echo ""
            echo "Formato esperado: tipo(scope): descripción"
            echo "Tipos válidos: feat fix docs chore infra security migration refactor test style"
            exit 1
          fi
