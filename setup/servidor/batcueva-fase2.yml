# =============================================================================
# batcueva-fase2.yml — Monitoring + OSINT + Gestión
# Ejecutar: docker compose -f batcueva-fase2.yml up -d
# Requiere: Fase 1 activa (Ollama + WebUI + Qdrant)
# =============================================================================

services:

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    labels:
      - "batcueva.fase=2"
      - "batcueva.servicio=portainer"

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data
    labels:
      - "batcueva.fase=2"
      - "batcueva.servicio=uptime-kuma"

  spiderfoot:
    image: smicallef/spiderfoot:latest
    container_name: spiderfoot
    restart: always
    ports:
      - "5001:5001"
    volumes:
      - spiderfoot_data:/home/spiderfoot/.spiderfoot
    labels:
      - "batcueva.fase=2"
      - "batcueva.servicio=spiderfoot-osint"

  heimdall:
    image: linuxserver/heimdall:latest
    container_name: heimdall
    restart: always
    ports:
      - "8090:80"
      - "8091:443"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
    volumes:
      - heimdall_data:/config
    labels:
      - "batcueva.fase=2"
      - "batcueva.servicio=dashboard"

volumes:
  portainer_data:
  uptime_kuma_data:
  spiderfoot_data:
  heimdall_data:

networks:
  default:
    name: batcueva
    external: true
