# =========================================================================
# BATCUEVA OSINT EXPANSION — docker-compose.yml
# Servicios: IVRE (Shodan clon) + Recon-ng + Qdrant (vectorial)
# Prereqs: vm.max_map_count=262144 (sudo sysctl -w vm.max_map_count=262144)
# Ejecutar: docker compose up -d
# =========================================================================
version: '3.8'

services:
  ivre-db:
    image: mongo:6.0
    container_name: ivre-mongodb
    restart: unless-stopped
    environment:
      - TZ=Europe/Madrid
    volumes:
      - ivre_db_data:/data/db

  ivre-web:
    image: ivre/web:latest
    container_name: ivre-webui
    restart: unless-stopped
    ports:
      - "8089:80"
    environment:
      - TZ=Europe/Madrid
    depends_on:
      - ivre-db

  ivre-client:
    image: ivre/client:latest
    container_name: ivre-cli
    restart: unless-stopped
    network_mode: "host"
    environment:
      - TZ=Europe/Madrid
    volumes:
      - ./ivre/scans:/workspace
    depends_on:
      - ivre-db

  recon-ng:
    image: mountainsec/recon-ng:latest
    container_name: batcueva-reconng
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      - TZ=Europe/Madrid
    volumes:
      - recon_ng_data:/root/.recon-ng

  qdrant:
    image: qdrant/qdrant:latest
    container_name: batcueva-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    environment:
      - TZ=Europe/Madrid
    volumes:
      - qdrant_data:/qdrant/storage

  amass:
    image: caffix/amass:latest
    container_name: batcueva-amass
    profiles:
      - tools
    environment:
      - TZ=Europe/Madrid
    volumes:
      - ./amass:/config
      - ./ivre/scans:/outputs

volumes:
  ivre_db_data:
  recon_ng_data:
  qdrant_data:
