# docker-compose.agents.yml
# Todos los agentes del ecosistema Yggdrasil
# Usar con: docker compose -f docker-compose.agents.yml up -d
# Docs: agentes/LABORATORIO-AGENTES.md

version: "3.9"

networks:
  yggdrasil-agents:
    driver: bridge
    name: yggdrasil-agents

services:

  # ─── MCP SERVER v2 ────────────────────────────────
  # No tiene container propio - corre como proceso en Madre
  # Ver: agentes/mcp-server/mcp_server_v2.py

  # ─── HEALTH AGENT ───────────────────────────────
  health-agent:
    build:
      context: ./health-agent
      dockerfile: Dockerfile
    container_name: health-agent
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - LLM_MODEL=phi3:mini
      - LOG_ROOT=/logs/health-agent
      - PORT=8001
    volumes:
      - /srv/yggdrasil-dew:/srv/yggdrasil-dew:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /srv/logs/agents:/logs
    networks:
      - yggdrasil-agents
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "yggdrasil.agent=health"
      - "yggdrasil.model=phi3:mini"

  # ─── SECURITY AGENT ───────────────────────────
  security-agent:
    build:
      context: ./security-agent
      dockerfile: Dockerfile
    container_name: security-agent
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - LLM_MODEL=phi3:mini
      - LOG_ROOT=/logs/security-agent
      - PORT=8004
    volumes:
      - /var/log:/var/log:ro  # auth.log, ufw.log
      - /srv/logs/agents:/logs
    networks:
      - yggdrasil-agents
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 60s
      timeout: 10s
      retries: 3
    labels:
      - "yggdrasil.agent=security"
      - "yggdrasil.model=phi3:mini"

  # ─── QDRANT INGESTA (job, no service) ─────────────
  # Ejecutar manualmente: docker compose run qdrant-ingesta
  qdrant-ingesta:
    image: python:3.12-slim
    container_name: qdrant-ingesta
    profiles: ["jobs"]  # Solo se lanza con --profile jobs
    command: >
      bash -c "pip install qdrant-client requests tqdm -q &&
               python /app/ingest_yggdrasil.py"
    environment:
      - QDRANT_URL=http://host.docker.internal:6333
      - OLLAMA_URL=http://host.docker.internal:11434
    volumes:
      - /srv/yggdrasil-dew:/srv/yggdrasil-dew:ro
      - ./qdrant-ingesta/ingest_yggdrasil.py:/app/ingest_yggdrasil.py:ro
    networks:
      - yggdrasil-agents

# Volumes compartidos
volumes:
  agent-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/logs/agents
