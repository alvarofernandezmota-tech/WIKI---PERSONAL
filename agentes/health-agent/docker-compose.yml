# ==============================================================================
# Yggdrasil-DEW - Health Agent Stack
# Puerto: 8001 | Ollama: host.docker.internal:11434
# ==============================================================================

services:
  health-agent:
    image: python:3.11-slim
    container_name: yggdrasil_health_agent
    restart: unless-stopped
    user: "1000:1000"
    volumes:
      - /srv/yggdrasil-dew:/srv/yggdrasil-dew:rw
      - /var/log:/var/log:rw
    environment:
      - HOME=/home/varopc
      - YGG_REPO_DIR=/srv/yggdrasil-dew
      - YGG_LOG_FILE=/var/log/yggdrasil-dew-maintenance.log
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Acceso a Ollama en Madre
    working_dir: /srv/yggdrasil-dew/agentes/health-agent
    ports:
      - "127.0.0.1:8001:8001"
    command: >
      bash -c "
        pip install --no-cache-dir fastapi uvicorn pydantic requests 2>/dev/null &&
        python3 health_agent.py
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: yggdrasil_ecosystem_network
    external: true
