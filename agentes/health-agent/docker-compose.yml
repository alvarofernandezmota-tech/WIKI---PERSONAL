version: "3.9"

services:
  health-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yggdrasil-health-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /srv/yggdrasil-dew:/srv/yggdrasil-dew
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_URL=http://localhost:11434/api/generate
    labels:
      - "yggdrasil.role=health-agent"
      - "yggdrasil.tier=secops"
