version: "3.9"

services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yggdrasil-mcp
    restart: unless-stopped
    volumes:
      - /srv/yggdrasil-dew:/srv/yggdrasil-dew
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "3000:3000"
    labels:
      - "yggdrasil.role=mcp-server"
      - "yggdrasil.tier=cerebro"
