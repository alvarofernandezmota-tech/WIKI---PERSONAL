# osint-stack/docker-compose.kali.yml
# ✅ VALIDADO Y CORRIENDO en varopc desde 01-jul-2026
# Kali Desktop vía navegador web — KasmWeb
#
# Acceso: https://100.91.112.32:6901
# Password: definida en KALI_VNC_PASSWORD o por defecto batcueva2026
#
# HARDENING:
#   ✅ Puerto solo en 100.91.112.32 (Tailscale), nunca 0.0.0.0
#   ⚠️  privileged: true necesario para herramientas de red (NET_ADMIN, NET_RAW)
#
# Uso:
#   cd ~/yggdrasil-dew/osint-stack
#   docker compose -f docker-compose.kali.yml up -d kali-pentest
#
# RAM: ~1.5-2.0 GB activo. NO levantar junto a Wazuh (RAM insuficiente).
# Verificar antes: free -h (necesita >3GB disponibles)

services:
  kali-pentest:
    image: kasmweb/kali-rolling-desktop:1.16.0
    container_name: kali-pentest
    hostname: kali-batcueva
    restart: unless-stopped
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    shm_size: '512m'
    ports:
      - "100.91.112.32:6901:6901"   # SOLO via Tailscale, nunca 0.0.0.0
    environment:
      - VNC_PW=${KALI_VNC_PASSWORD:-batcueva2026}
    volumes:
      - kali_data:/home/kasm-user
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4g

volumes:
  kali_data:

