# osint-stack/docker-compose.kali.yml
# ✅ VALIDADO: pendiente levantar en varopc (01-jul-2026)
# Kali Desktop vía navegador web — KasmWeb
#
# CAMBIO vs versión anterior:
#   ❌ macvlan VLAN66 (eno1.66 no existe en varopc, enp4s0 DOWN)
#   ✅ bridge normal — acceso directo vía puerto 6901
#
# Acceso: https://100.91.112.32:6901
# Usuario: kasm_user
# Password: definida en .env o por defecto batcueva2026
#
# Uso:
#   cd ~/yggdrasil-dew/osint-stack
#   docker compose -f docker-compose.kali.yml up -d

services:
  kali-pentest:
    image: kasmweb/kali-rolling-desktop:1.16.0
    container_name: kali-pentest
    hostname: kali-batcueva
    restart: unless-stopped
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    shm_size: '512m'            # requerido por KasmWeb para navegador
    ports:
      - "6901:6901"             # HTTPS WebUI — acceso: https://varopc:6901
    environment:
      - VNC_PW=${KALI_VNC_PASSWORD:-batcueva2026}
    volumes:
      - kali_data:/home/kasm-user  # persistencia home usuario kali
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4g

volumes:
  kali_data:

# ==============================================================================
# RAM ESTIMADA:
#   kali-pentest (KasmWeb desktop)  ~1.5-2.0 GB activo
#   Stack base ya corriendo         ~11.5 GB
#   ─────────────────────────────────
#   TOTAL ESTIMADO                  ~13.5 GB / 16 GB ⚠️ JUSTO
#
# ⚠️  Levantar Kali solo cuando RAM libre > 3 GB
#       Verificar: free -h
# ⚠️  NO levantar Wazuh simultáneamente con Kali sin revisar RAM
# ==============================================================================
