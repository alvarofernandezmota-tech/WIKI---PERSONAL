# ============================================================
# BATCUEVA OSINT STACK
# SpiderFoot + MongoDB (IVRE desactivado hasta imagen estable)
# Uso: docker compose -f docker/batcueva-osint.yml up -d
# Solo SpiderFoot: docker compose -f docker/batcueva-osint.yml up -d spiderfoot
# ============================================================
name: batcueva-osint

networks:
  osint-net:
    driver: bridge

volumes:
  spiderfoot-data:

services:

  # ---- SpiderFoot — imagen oficial GHCR ----
  # Web UI: http://100.91.112.32:5001
  spiderfoot:
    image: ghcr.io/smicallef/spiderfoot:latest
    container_name: spiderfoot
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - spiderfoot-data:/home/spiderfoot/.spiderfoot
    networks:
      - osint-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # IVRE: desactivado temporalmente — imagen no pública en Docker Hub
  # Alternativa futura: construir desde https://github.com/cea-sec/ivre
  # ivre-web:
  #   image: ivre/ivre:latest
  #   profiles: ["ivre"]
