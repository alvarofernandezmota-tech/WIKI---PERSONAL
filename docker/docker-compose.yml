version: "3.8"

services:
  mcp:
    build:
      context: ..
      dockerfile: docker/mcp/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - YGGDRASIL_ROOT=/app
      - MCP_API_TOKEN=${MCP_API_TOKEN:-changeme}
    volumes:
      - ../inbox:/app/inbox
      - ../reports:/app/reports
    restart: unless-stopped

  retrieval:
    build:
      context: ..
      dockerfile: docker/retrieval/Dockerfile
    ports:
      - "9001:9001"
    environment:
      - YGGDRASIL_ROOT=/app
    restart: unless-stopped

  agent-worker:
    build:
      context: ..
      dockerfile: docker/mcp/Dockerfile
    command: ["bash", "scripts/maintenance/master_run.sh", "--apply"]
    environment:
      - YGGDRASIL_ROOT=/app
      - PERPLEXITY_URL=${PERPLEXITY_URL:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
    volumes:
      - ../inbox:/app/inbox
      - ../reports:/app/reports
    profiles:
      - worker
