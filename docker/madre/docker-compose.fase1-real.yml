# ✅ ACTIVO — VALIDADO: 2026-07-01
# Stack base Madre (i5-8400, 16GB RAM, sin GPU)
# HARDENING: puertos bindeados a Tailscale 100.91.112.32 — 2026-07-01
# FUENTE REAL: ~/docker-compose.yml en madre
# NUNCA cargar qwen2.5:14b con stack activo

services:

  # ── OLLAMA CHAT (qwen2.5:7b para THDORA y conversación) ──
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "100.91.112.32:11434:11434"  # 🔒 solo Tailscale
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_NUM_THREADS=3
      - OLLAMA_KEEP_ALIVE=5m
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: '3.5'
          memory: 7g
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── OLLAMA EMBEDDINGS (bge-m3 para RAG/Qdrant) ──
  ollama-embeddings:
    image: ollama/ollama:latest
    container_name: ollama-embeddings
    restart: unless-stopped
    ports:
      - "100.91.112.32:11435:11434"  # 🔒 solo Tailscale
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_THREADS=2
      - OLLAMA_KEEP_ALIVE=10m
    volumes:
      - ollama_embeddings_data:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2g
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── QDRANT (memoria vectorial RAG) ──
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "100.91.112.32:6333:6333"  # 🔒 solo Tailscale
    volumes:
      - qdrant_storage:/qdrant/storage
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2g
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz | grep -q ok"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── OPEN-WEBUI (interfaz web para Ollama) ──
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "100.91.112.32:3001:8080"  # 🔒 solo Tailscale
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - VECTOR_DB=qdrant
      - QDRANT_URI=http://qdrant:6333
      - ENABLE_RAG=true
    volumes:
      - open_webui_data:/app/backend/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1g
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health | grep -q ok || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  ollama_data:
  ollama_embeddings_data:
  open_webui_data:
  qdrant_storage:

