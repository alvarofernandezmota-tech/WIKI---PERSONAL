# Kali Linux KasmWeb — entorno pentest visual en navegador

version: '3.8'

services:
  kali-pentest:
    image: kasmweb/kali-rolling-desktop:1.16.0
    container_name: kali-pentest
    restart: unless-stopped
    ports:
      - "6901:6901"
    environment:
      - VNC_PW=password  # ⚠️ cambiar antes de produccion
      - KASM_USER=kasm_user
    volumes:
      - kali_data:/home/kasm-user
    shm_size: '512m'
    # Estado: descargando imagen (3.7GB) — verificar con: docker ps | grep kali

volumes:
  kali_data:
    driver: local
