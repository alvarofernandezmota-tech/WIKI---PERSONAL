# ==============================================================================
# docker-compose.batcueva.yml — Stack principal Batcueva (13 contenedores)
# Generado: 30-jun-2026 — Fase 2
# ==============================================================================

version: '3.8'

services:

  # ============================================================
  # BLOQUE IA — Ollama + Embeddings + Qdrant + Open WebUI
  # ============================================================

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ./data/ollama:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_NOPRUNE=1
    deploy:
      resources:
        limits:
          cpus: '5.0'
    networks:
      - ai-net
    restart: unless-stopped

  ollama-embeddings:
    image: ollama/ollama:latest
    container_name: ollama-embeddings
    volumes:
      - ./data/ollama-embed:/root/.ollama
    ports:
      - "11435:11434"
    deploy:
      resources:
        limits:
          cpus: '4.0'
    networks:
      - ai-net
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    networks:
      - ai-net
      - batcueva-net
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3001:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./data/open-webui:/app/backend/data
    networks:
      - ai-net
      - batcueva-net
    depends_on:
      - ollama
    restart: unless-stopped

  # ============================================================
  # BLOQUE THDORA — Bot + API
  # ============================================================

  thdora:
    image: python:3.11-slim
    container_name: thdora
    ports:
      - "8000:8000"
    volumes:
      - ./thdora-app:/app
    environment:
      - ENV=production
    networks:
      - batcueva-net
    restart: unless-stopped

  thdora-bot:
    image: python:3.11-slim
    container_name: thdora-bot
    restart: always
    networks:
      - batcueva-net
    depends_on:
      - thdora

  # ============================================================
  # BLOQUE DESARROLLO Y AUTOMATIZACIÓN
  # ============================================================

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - ./data/n8n:/home/node/.n8n
    networks:
      - batcueva-net
    restart: unless-stopped

  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    ports:
      - "3003:3000"
    volumes:
      - ./data/gitea:/data
    networks:
      - batcueva-net
    restart: unless-stopped

  code-server:
    image: codercom/code-server:latest
    container_name: code-server
    ports:
      - "8443:8080"
    volumes:
      - ./data/code-server:/home/coder/project
    networks:
      - batcueva-net
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/portainer:/data
    networks:
      - batcueva-net
    restart: unless-stopped

  # ============================================================
  # BLOQUE OBSERVABILIDAD
  # ============================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./data/prometheus:/etc/prometheus
    networks:
      - monitor-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./data/grafana:/var/lib/grafana
    networks:
      - monitor-net
      - batcueva-net
    restart: unless-stopped

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    ports:
      - "3002:3001"
    volumes:
      - ./data/uptime-kuma:/app/data
    networks:
      - monitor-net
      - batcueva-net
    restart: unless-stopped

networks:
  batcueva-net:
    driver: bridge
  ai-net:
    driver: bridge
  monitor-net:
    driver: bridge
